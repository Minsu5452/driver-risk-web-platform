worker_processes  1;

error_log  ../logs/nginx-error.log;
pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    access_log  ../logs/nginx-access.log;

    sendfile           on;
    keepalive_timeout  65;

    # 업로드 용량 제한 해제 (대용량 Excel 허용)
    client_max_body_size 0;

    # 학습/추론 장시간 대기 허용 (2시간)
    proxy_connect_timeout 7200s;
    proxy_send_timeout    7200s;
    proxy_read_timeout    7200s;

    server {
        listen       3000;
        server_name  localhost;

        root  ../frontend/dist;
        index index.html;

        # ---- API 프록시 (Vite 프록시와 동일 규칙; 구체적 경로 먼저) ----

        # /api/admin/* -> AI Engine /admin/*
        location /api/admin/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /api/analysis/* -> AI Engine /*
        location /api/analysis/ {
            rewrite ^/api/analysis/(.*)$ /$1 break;
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /api/predict/* -> AI Engine /predict/*
        location /api/predict/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /api/* -> Spring Boot /api/* (no rewrite)
        location /api/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # index.html 캐시 비활성화 (배포 후 이전 UI 잔존 방지)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma        "no-cache";
            add_header Expires       0;
        }

        # SPA 클라이언트 라우팅
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
